#
# Дата обновления уйдёт в schema.org/Article dateModified и в sitemap lastmod.

slug: "dlya-semi"
title: "Меню на неделю для семьи из 3-4 человек"
emoji: "👨‍👩‍👧‍👦"
updated: "2026-05-16"

short_answer: >-
  Готовое меню на 7 дней для семьи из 3-4 человек: 4 приёма пищи в день,
  итого КБЖУ от 1900 до 2200 ккал на взрослого, реальное время готовки 25-45
  минут в будни (один полноценный готовочный заход в воскресенье). Все рецепты
  ниже подобраны так, чтобы продукты переиспользовались между днями — список
  покупок получается короче чем у произвольного набора.

audience: "Семья из 2 взрослых + 1-2 детей школьного возраста."

how_we_picked: >-
  Алгоритм отбирает рецепты по критериям: ровный КБЖУ по дням,
  максимальное переиспользование ингредиентов (например, варёная курица в
  понедельник → салат во вторник), будни — не дольше 35 минут активной готовки,
  выходные — допускается полноценная готовка. Учитываются типичные предпочтения
  семейной аудитории: умеренная острота, без экзотики, бюджет.

# Бюджет — справочно, заменится на актуальные цены когда подключим feed
weekly_budget_hint: "ориентировочно 4 200-5 500 ₽ за все продукты на неделю"

