  unique_main_products: 9
  comment: "На взрослого ~1980 ккал/день. Активное время готовки за неделю — 3 часа. На 9 основных продуктов уходит ~80% бюджета."

faq:
  - q: "Можно ли заранее сделать ВСЕ блюда на неделю?"
    a: "Не стоит. Свежие салаты, омлеты, тосты теряют качество через 12 часов. Готовь блоками: воскресенье — основа на 3 дня; среда — освежение. Это даёт компромисс между «всё впрок» и «свежее каждый день»."
  - q: "Подходит ли это меню для одного ребёнка-подростка дома?"
    a: "Да, но уменьши порции на 30-40% и сделай каши пожирнее (молоко вместо воды, добавь сливочное масло). Подростку 14-16 лет нужно ~2400 ккал — наоборот, добавь по перекусу."
  - q: "Что если у нас 2 родителя на работе и обедают вне дома?"
    a: "Тогда меню сжимается до завтрак + ужин + перекусы. Обеды из списка можно использовать в выходные или для ребёнка дома."

