# Что и когда достать из морозилки
defrost_schedule:
  - "Воскресенье вечер — достань фарш для понедельника (250 г)"
  - "Понедельник вечер — достань рыбу для вторника (~500 г)"
  - "Среда вечер — достань свинину для субботы (~800 г)"

# Что можно (нужно) заготовить впрок
prep_ahead:
  - "В воскресенье свари рис на 2 дня вперёд и часть курицы — это сэкономит ~15 мин в понедельник."
  - "Котлет из понедельника сделай в 2 раза больше — заморозь половину для будущей недели."
  - "Овощную нарезку для салатов держи в холодильнике в контейнере с салфеткой — продержится 3 дня."

# Что заменить если...
adjustments:
  - condition: "Не едите рыбу"
    swap: "Вторник ужин: запечённая курица с овощами вместо запечённой рыбы."
  - condition: "Один из членов семьи на ПП / худеет"
    swap: "Замени пасту по-флотски (среда) на куриную грудку с гречкой, котлеты из говядины (понедельник) — на куриные котлеты на пару."
  - condition: "В семье ребёнок до 5 лет"
    swap: "Уменьши специи. Куриные крылышки (пятница) замени на курицу в кефире — мягче."
  - condition: "Не любите тыкву"
    swap: "Четверг обед: куриный бульон с фрикадельками вместо тыквенного супа."

# Итоговая статистика
totals:
  avg_kcal_adult: 1980
