# Структура построена под архетип F (см. sitemap-plan.md §8).
# Главная конверсионная страница: полное 7-дневное меню + реальные тайминги
# + замены + список покупок → CTA в продукт.
#
# Уникальный вклад (anti-replicability + contentEffort из «Доказательного SEO»):
