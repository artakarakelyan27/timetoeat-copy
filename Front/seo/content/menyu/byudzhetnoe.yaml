# Бюджетные принципы (анти-replicability — конкретика, которой нет у конкурентов)
budget_principles:
  - title: "Дешёвый белок"
    content: "Куриные бёдра (200-280 ₽/кг) почти в 2 раза дешевле грудки. Фарш домашний (210-280 ₽/кг) дешевле готовых котлет. Яйца — самый бюджетный белок в принципе (8-10 ₽/штука). Чечевица, фасоль — 60-100 ₽/кг."
  - title: "Сезонные овощи"
    content: "В январе-марте — капуста, морковь, лук, картошка, свёкла (20-50 ₽/кг). В июле-сентябре — кабачки, помидоры, огурцы (40-80 ₽/кг). Зимние тепличные помидоры и огурцы — 200+ ₽/кг, экономии не дадут."
  - title: "Крупы — основа"
    content: "Гречка, рис, перловка, овсянка — 80-150 ₽/кг и на месяц хватает. Манка — самая дешёвая (60 ₽/кг). Кускус, киноа, булгур — дороже в 3-5 раз, не для бюджета."
  - title: "Заморозка как стратегия"
    content: "Куриные бёдра, фарш и пельмени домашние — все морозятся отлично 3+ месяцев. Купив бёдра по акции (190 ₽/кг при стандарте 280) — экономия 30% сразу."

# Что НЕ стоит экономить
do_not_save_on:
  - "Свежая рыба — дешёвая часто плохого качества. Лучше консервы (горбуша/сардина) — 90-130 ₽/банка."
  - "Молочка — обезжиренная сметана 5% не сильно дешевле 15% но хуже на вкус и без жирорастворимых витаминов."
  - "Соусы и приправы — экономия 30 ₽ убивает блюдо. Качественное оливковое масло на пол-литра 400-600 ₽ — нормально."
  - "Хлеб — самый дешёвый «социальный» (20-30 ₽) почти без питательной ценности. Бери цельнозерновой (60-90 ₽), идёт в 2 раза дольше."

defrost_schedule:
  - "Воскресенье — куриные бёдра на понедельник (~600 г)"
  - "Вторник — фарш на среду (~400 г)"
  - "Пятница — селёдку из морозилки или купить свежемороженую"

prep_ahead:
  - "В субботу лепи пельмени на месяц вперёд — 1 час работы, 200 ₽/кг себестоимость. Магазинные за такую цену = курятина-перемолотая-чтобы-узнать-нельзя."
  - "В воскресенье свари 2 кг куриных бёдер — мясо отделится, бульон останется. На неделю хватит на 3 блюда."
  - "Овощи нарезай большими партиями — лук и морковь жарь сразу на 2 заправки."

adjustments:
  - condition: "Вегетарианский вариант"
    swap: "Куриные бёдра → грибы (шампиньоны 280 ₽/кг). Фарш → чечевица. Тушёнка → консервированная фасоль с томатной пастой."
  - condition: "Без бюджетных полуфабрикатов вообще (пельмени, сосиски)"
    swap: "Среда ужин: запеканка из фарша вместо макарон по-флотски. Воскресенье ужин: тушёные куриные крылышки вместо сосисок."
  - condition: "Если уложиться в 2 000 ₽"
    swap: "Урезать селёдку (-70 ₽) и сократить порции мяса на 30%. Добавь больше круп и яиц. Будет ~2 200 ₽ — ниже стабильно не получится без здоровья."
  - condition: "Семья с ребёнком 3-7 лет"
    swap: "Усложни питание на одного ребёнка ~+700 ₽/нед: молоко 1 л/день, творог 2-3 раза, банан раз в день. Бюджет на семью с детьми реалистично 4 200-4 800 ₽."

