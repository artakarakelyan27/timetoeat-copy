short_answer: >-
  Меню на 7 дней для семьи из 2 человек, бюджет на продукты — около 2 800-3 200 ₽.
  Основу составляют недорогие источники белка (фарш, яйца, куриные ножки,
  чечевица), сезонные овощи и крупы. Активная готовка — 25-35 минут в день,
  потому что бюджетные продукты часто требуют больше времени на готовку чем
  готовые полуфабрикаты.

audience: "Двое взрослых, цель — уложиться в 3 000 ₽ на продукты в неделю без жёсткой экономии на качестве."

how_we_picked: >-
  Подбирали по соотношению ₽/калория и ₽/грамм белка. Куриные бёдра дешевле
  грудки в 2 раза — берём их, но компенсируем больше работы (срезаем кость).
  Сезонные овощи (капуста зимой, кабачок летом) — это не догма а просто
  правило: то что в сезон, дешевле в 1,5-3 раза. Сравнивали цены в Самокат,
  Перекрёсток, Магнит в апреле 2026 — берём ориентир по медиане.

