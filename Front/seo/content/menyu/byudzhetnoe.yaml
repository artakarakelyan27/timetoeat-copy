faq:
  - q: "Можно ли уложиться в 2 000 ₽?"
    a: "В апреле 2026 — реально только если урезать мясо до 1 раза в неделю или перейти на куриные части ещё дешевле (печёнка, потроха). Это уже не комфортная еда, а выживание — не рекомендуем без острой необходимости."
  - q: "Где смотреть актуальные цены?"
    a: "В приложениях супермаркетов и сервисов доставки — Самокат, Перекрёсток, Магнит, Пятёрочка. Цены здесь приведены ориентировочно по медиане апреля 2026."
  - q: "Не вреден ли такой бюджет для здоровья?"
    a: "При соблюдении этого меню — нет. КБЖУ выровнен, белок есть в каждом приёме, овощи присутствуют, нет крайностей. Опасный «бюджет» — это макароны+майонез или хлеб+сахар каждый день."

