faq:
  - q: "Это правильное питание или диета?"
    a: "Это ПП — питание без жёстких ограничений. Не голодная. Подходит для поддержания формы или плавного снижения веса (≈0,3 кг/нед). Диета 1200 ккал — это уже другая история, к ней нужен врач."
  - q: "Можно ли пропустить перекус если не хочется?"
    a: "Можно, но дневной калораж снизится на 130-220 ккал. Если повторяется 3-4 раза в неделю — это уже дефицит и можно похудеть быстрее, чем планировалось. Следи за весом."
  - q: "Подойдёт ли это мужчине?"
    a: "Для мужчины 70-90 кг с лёгкой активностью этот калораж низковат. Добавь +300-500 ккал: больше круп в обед, +50 г белка в день."

