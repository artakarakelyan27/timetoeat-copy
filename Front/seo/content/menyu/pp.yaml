adjustments:
  - condition: "Зимой не хочется холодного — нужны горячие супы каждый день"
    swap: "Замени второй перекус на 200 мл лёгкого супа-пюре из любого овоща + 1 ч.л. сливок."
  - condition: "Активные тренировки 4-5 раз в неделю"
    swap: "Добавь +200 ккал в дни тренировок: 30 г каши утром + 1 банан после тренировки."
  - condition: "Питаешься вне дома 2-3 раза в неделю"
    swap: "В офисе бери с собой контейнер с обедом из этого меню или замени на готовое блюдо без соусов: курица + рис + овощи."
  - condition: "Беременность или ГВ"
    swap: "Эта диета не подходит. Согласуй с врачом — нужно +300-500 ккал и больше железа/кальция."

