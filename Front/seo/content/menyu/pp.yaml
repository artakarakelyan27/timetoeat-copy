# не сидит на жёсткой диете. Сегмент «осознанная 45+» из брендбука + часть
# хозяйки-оптимизатора.
#
# GIST-узлы которые отличают от food.ru:
#   - Точные граммы белка/жира/углеводов (а не общие фразы «низкокалорийный»)
#   - Реалистичные тайминги (без обмана «10 минут»)
#   - Что заменить если зимой / летом
#   - Где скрытые калории прячутся (соусы, заправки)

slug: "pp"
title: "ПП-меню на неделю — 1700 ккал в день"
emoji: "🥗"
updated: "2026-05-16"

short_answer: >-
  Готовое ПП-меню на 7 дней: ~1700 ккал/день, БЖУ 100/60/170, 5 приёмов пищи,
  активная готовка в среднем 25 минут в день. Без сахара в чистом виде,
  с обязательными белком на каждый приём и овощами в каждом обеде и ужине.
  Этого хватает для поддержания формы у женщины 30-45 лет с лёгкой активностью.

audience: "Один взрослый, цель — поддержание формы или плавное снижение веса (-0,3 кг/нед)."

how_we_picked: >-
  Цель — выйти на 1700 ккал/день с белком ≥1,5 г/кг массы и сложными
  углеводами утром+днём. Простые углеводы исключены кроме фруктов в
  завтрак и перекус. Жиры — преимущественно из ненасыщенных источников
  (орехи, авокадо, рыба). Тренировочные дни обозначены — там калорий и
  углеводов чуть больше.

weekly_budget_hint: "ориентировочно 2 800-3 800 ₽ за продукты на 1 человека"

