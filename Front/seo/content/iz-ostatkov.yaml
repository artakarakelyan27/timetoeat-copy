# «Из остатков» — данные для /iz-ostatkov/[slug].
# Тренд recovery-cooking + рекуперация еды. У food.ru/russianfood.com закрыт слабо.
# Каждая запись отвечает: что у меня осталось → что из этого реалистично сделать.

- slug: kuritsa
  name: остатков курицы
  source_name: варёная или запечённая курица
  emoji: ♻️🍗
  updated: 2026-05-16
  short_answer: >-
    Из 200 г варёной курицы можно сделать: сэндвич с майонезом и зеленью,
    салат с овощами, лапшу с курицей и соусом, кесадилью, фарш для блинчиков.
    Главное — добавить жир (масло, соус, сыр), иначе мясо будет сухим.
  scenarios:
    - title: Сэндвич за 5 минут
      need: 200 г курицы + 4 куска хлеба + майонез + помидор + салат
      steps:
        - Курицу нарвать руками на волокна (не резать).
        - Смешать с майонезом и щепоткой соли.
        - Намазать на хлеб, добавить помидор и салат.
      time: 5 мин
    - title: Тёплый салат
      need: 200 г курицы + 100 г листового салата + 1 авокадо + горсть орехов + оливковое масло
      steps:
        - Курицу прогреть в микроволновке 30 сек или на сковороде.
        - Смешать с зеленью, авокадо, орехами.
        - Заправить оливковым маслом + лимонный сок + соль.
      time: 10 мин
    - title: Кесадилья
      need: 200 г курицы + 2 тортильи + 100 г сыра + ложка сметаны + специи
      steps:
        - Курицу смешать со сметаной и специями (паприка, тмин).
        - Положить на тортилью, посыпать сыром, накрыть второй тортильей.
        - Жарить на сковороде по 2 минуты с каждой стороны до плавления сыра.
      time: 12 мин
    - title: Куриный рулет / блинчики
      need: 200 г курицы + 4 блина или лаваш + сыр + зелень + майонез
      steps:
        - Курицу нарвать на волокна.
        - Намазать блин или лаваш майонезом, выложить курицу, сыр, зелень.
        - Свернуть рулетом, нарезать кусочками.
      time: 10 мин
  donts:
    - Не разогревай курицу повторно более одного раза — это сушит мясо и потеря питательных веществ.
    - Не делай суп из старой курицы (старше 2 дней) — лучше использовать сразу в холодные блюда.
    - Не маринуй уже варёное мясо «надолго» — кислота кислоту разрушает белок, текстура станет ватной.
  faq:
    - q: Сколько хранится варёная курица в холодильнике?
      a: 3–4 дня в герметичном контейнере при +2…+4°C. Подробнее в [справочнике хранения](/spravochnik/srok-khraneniya/kuritsa).
    - q: Можно ли заморозить остатки варёной курицы?
      a: Да, до 3 месяцев. Нарви на кусочки, выложи в пакет, выдави воздух. Размораживать в холодильнике ночь.
  linked_ingredient: kuritsa

- slug: ris
  name: остатков риса
  source_name: варёный рис (вчерашний или дольше)
  emoji: ♻️🍚
  updated: 2026-05-16
  short_answer: >-
    Холодный рис из холодильника — идеален для жареного риса, рисовых
    котлет, ризотто-аранчини, начинки для голубцов. Из «вчерашнего» риса
    получается лучше, чем из свежесваренного — он суше и не слипается на сковороде.
  scenarios:
    - title: Жареный рис «по-китайски»
      need: 300 г риса + 2 яйца + 1 морковь + 1 лук + соевый соус + горошек
      steps:
        - Лук с морковью обжарить на сильном огне 3 минуты.
        - Добавить рис, мешать ещё 2 минуты.
        - Сделать «лунку» в центре, вбить яйца, помешать.
        - Залить 2 ст. л. соевого соуса, добавить горошек, прогреть 1 минуту.
      time: 12 мин
    - title: Рисовые котлеты
      need: 300 г риса + 1 яйцо + 2 ст. л. муки + сыр + специи
      steps:
        - Рис смешать с яйцом, мукой, тёртым сыром.
        - Слепить котлеты, обвалять в сухарях.
        - Жарить 3 минуты с каждой стороны до золотистой корочки.
      time: 15 мин
    - title: Аранчини (итальянские рисовые шарики)
      need: 300 г риса + 1 яйцо + 100 г моцареллы + панировочные сухари
      steps:
        - Рис смешать с яйцом, посолить.
        - Слепить шарик, внутрь — кубик моцареллы, закрыть.
        - Обвалять в сухарях.
        - Жарить во фритюре или на сковороде с маслом 3–4 минуты до золотистой корки.
      time: 20 мин
    - title: Голубцы или фарш для перцев
      need: 300 г риса + 200 г фарша + лук + морковь + специи
      steps:
        - Рис смешать с фаршем и обжаренным луком с морковью.
        - Использовать как начинку для голубцов или болгарских перцев.
      time: 10 мин (без учёта тушения)
  donts:
    - Не оставляй варёный рис при комнатной температуре более 2 часов — бактерия Bacillus cereus образует токсин, который не убивается нагревом.
    - Не разогревай рис повторно более одного раза.
    - Не делай суп из холодного риса — он разварится в кашу.
  faq:
    - q: Безопасно ли есть вчерашний рис?
      a: Да, если он сразу после варки убран в холодильник (в течение 1 часа). Хранение — до 2 дней в холодильнике. Признаки порчи — кислый запах, липкая слизь.
    - q: Почему именно холодный рис лучше жарить?
      a: При охлаждении часть крахмала ретроградирует — становится менее липким. Поэтому жареный рис из вчерашнего выходит рассыпчатым, а из свежего — слипается в кашу.
  linked_ingredient: ris

- slug: kartoshka-varenaya
  name: остатков варёной картошки
  source_name: варёная или печёная картошка
  emoji: ♻️🥔
  updated: 2026-05-16
  short_answer: >-
    Из остывшей варёной картошки — драники, картофельные оладьи, запеканка
    с сыром, начинка для вареников, картофельный салат. Из старого пюре —
    клёцки или картофельные котлеты. Жарить пюре нельзя — расползётся.
  scenarios:
    - title: Драники из остатков
      need: 4–5 картофелин + 1 яйцо + 2 ст. л. муки + лук + специи
      steps:
        - Картошку натереть на тёрке (если варёная — раздавить вилкой).
        - Лук натереть, смешать с картошкой, яйцом, мукой.
        - Жарить на сковороде по 3 минуты с каждой стороны.
      time: 15 мин
    - title: Картофельная запеканка с сыром
      need: 4–5 картофелин + 100 г сыра + 200 мл сливок + чеснок + специи
      steps:
        - Картошку нарезать кружочками или раздавить.
        - Выложить в форму, залить сливками с чесноком.
        - Посыпать сыром.
        - Запекать 25 минут при 180°C.
      time: 35 мин
    - title: Картофельные котлеты с начинкой
      need: 4 картофелины + 1 яйцо + грибы или сыр для начинки + сухари
      steps:
        - Картошку размять в пюре с яйцом.
        - Слепить котлету, в центр — обжаренные грибы или сыр.
        - Закрыть, обвалять в сухарях, жарить 3 минуты с каждой стороны.
      time: 20 мин
    - title: Картофельный салат «по-немецки»
      need: 4–5 картофелин + лук + солёные огурцы + горчица + майонез
      steps:
        - Картошку нарезать кубиками.
        - Лук и огурцы мелко нарезать.
        - Смешать всё с майонезом и 1 ч. л. горчицы.
      time: 10 мин
  donts:
    - Не разогревай варёную картошку повторно более одного раза.
    - Не делай суп из старого пюре — расползётся в кашу с комками.
    - Картошку в мундире из холодильника не разогревай в микроволновке без рассечения шкурки — взорвётся.
  faq:
    - q: Сколько хранится варёная картошка?
      a: 3–4 дня в холодильнике в герметичном контейнере. Без контейнера темнеет за день.
    - q: Из какой картошки лучше делать драники?
      a: Из сырой — пышнее. Но из остатков варёной получаются плотнее и питательнее (меньше масла впитывают).
  linked_ingredient: kartoshka

- slug: farsh-zharenyj
  name: остатков жареного фарша
  source_name: жареный мясной фарш
  emoji: ♻️🍖
  updated: 2026-05-16
  short_answer: >-
    Из жареного фарша делают пасту по-флотски, лазанью, паприкаш, начинку
    для пирожков или блинов, тако, рис с фаршем (donburi). 200 г фарша
    хватает на 2-3 порции при добавлении базы (паста, рис, овощи).
  scenarios:
    - title: Паста по-флотски за 10 минут
      need: 200 г фарша + 200 г пасты + лук + чеснок + соль/перец
      steps:
        - Отварить пасту.
        - Лук с чесноком обжарить, добавить фарш для прогрева.
        - Смешать с пастой, добавить ст. л. сливочного масла.
      time: 12 мин
    - title: Лазанья из остатков
      need: 200 г фарша + 4 листа лазаньи + 200 г томатной пасты + 100 г сыра + бешамель
      steps:
        - Фарш смешать с томатной пастой.
        - Выкладывать слоями: лист пасты → фарш → бешамель → сыр. Повторить 3 раза.
        - Запекать 30 минут при 180°C.
      time: 45 мин
    - title: Donburi (рис с фаршем по-японски)
      need: 200 г фарша + 200 г риса + 1 яйцо + соевый соус + сахар + имбирь
      steps:
        - Фарш прогреть с соевым соусом, сахаром и имбирём.
        - Положить на варёный рис.
        - Сверху — глазунья.
      time: 12 мин
    - title: Начинка для блинов или пирожков
      need: 200 г фарша + 2 яйца варёных + лук + сметана
      steps:
        - Фарш прогреть с обжаренным луком.
        - Добавить рубленые варёные яйца и сметану.
        - Завернуть в готовые блины или тесто.
      time: 15 мин
  donts:
    - Не разогревай фарш повторно более одного раза — мясные продукты особенно чувствительны к разогреву.
    - Не делай котлеты из готового жареного фарша — не получится связки, развалятся.
    - Не оставляй фарш в комнате остывать «полностью» — после 1 часа отправляй в холодильник.
  faq:
    - q: Сколько хранится готовый жареный фарш?
      a: 2–3 дня в холодильнике, 2–3 месяца в морозилке. Из размороженного — сразу в готовку, без повторной заморозки.
    - q: Можно ли смешивать остатки разного фарша (говядина + свинина)?
      a: Да, в пасту по-флотски, лазанью или паприкаш. Только если оба фарша из одной партии (одно время жарки/хранения).
  linked_ingredient: farsh

- slug: spagetti
  name: остатков спагетти
  source_name: варёные спагетти или паста любая
  emoji: ♻️🍝
  updated: 2026-05-16
  short_answer: >-
    Из вчерашних спагетти получается отличная паста-фриттата (запечённая
    итальянская «вафля» из пасты с яйцом), запеканка с сыром, холодный
    салат с овощами. Из остывшей пасты не делают суп — она разваривается.
  scenarios:
    - title: Паста-фриттата (без рецепта в холодильнике)
      need: 200 г пасты + 3 яйца + 100 г сыра + лук + специи
      steps:
        - Яйца взбить с сыром, солью, перцем.
        - Лук обжарить на сковороде с маслом.
        - Добавить пасту, прогреть 1 минуту.
        - Залить яйцами с сыром, накрыть крышкой.
        - Готовить 5 минут на медленном огне до схватывания.
      time: 12 мин
    - title: Запеканка из пасты
      need: 200 г пасты + 200 мл сливок + 100 г сыра + ветчина + специи
      steps:
        - Смешать пасту со сливками и порезанной ветчиной.
        - Выложить в форму, посыпать сыром.
        - Запекать 20 минут при 180°C.
      time: 25 мин
    - title: Холодный салат с пастой
      need: 200 г пасты + помидоры черри + моцарелла + оливковое масло + базилик
      steps:
        - Пасту остудить, смешать с порезанными помидорами и моцареллой.
        - Заправить оливковым маслом, добавить базилик, посолить.
      time: 8 мин
  donts:
    - Не разогревай пасту в кастрюле с водой — разварится. Лучше — на сковороде с ложкой воды или соуса.
    - Не делай макароны по-флотски из вчерашней пасты, если она была без соуса и подсохла — будет жёстко.
    - Не клади остывшую пасту в горячий бульон супа — превратится в кашу.
  faq:
    - q: Сколько хранится варёная паста?
      a: 3 дня в холодильнике в герметичном контейнере. Капни ложку оливкового масла, чтобы не слиплась.
    - q: Можно ли заморозить варёную пасту?
      a: Можно, до 1 месяца, но текстура после оттаивания страдает. Лучше готовить впрок соус и замораживать его отдельно от свежей пасты.
  linked_ingredient: spagetti
