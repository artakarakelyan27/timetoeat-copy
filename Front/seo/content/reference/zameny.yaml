# Замены ингредиентов — данные для /spravochnik/zameny/[slug].
#
# Все строковые значения в двойных кавычках — избегаем yaml-парсер-проблем
# с двоеточиями внутри обычной русской речи.
# Внутри двойных кавычек экранируется только сама двойная кавычка (\") и backslash.

- slug: yajco
  name: "Яйцо куриное"
  emoji: "🥚"
  updated: "2026-05-16"
  short_answer: "Вместо 1 куриного яйца в выпечке возьми 3 ст. ложки яблочного пюре, 1 спелый банан 60 г или 1 ст. ложку крахмала + 3 ст. ложки воды. Для жарки и омлетов — тофу 100 г с щепоткой куркумы."
  cases:
    - use_in: "Выпечка (кексы, оладьи, печенье)"
      replace: "3 ст. л. яблочного пюре или 1 банан 60 г"
      note: "Сделает текстуру чуть плотнее. На дрожжевое тесто не работает."
    - use_in: "Густое тесто (запеканки, котлеты)"
      replace: "1 ст. л. крахмала + 3 ст. л. воды, перемешать"
      note: "Работает как связующее. Аналог льняного «яйца» (1 ст. л. молотого льна + 3 ст. л. воды)."
    - use_in: "Омлет или яичница"
      replace: "100 г тофу + куркума + чёрная соль кала-намак"
      note: "Кала-намак даёт характерный «яичный» запах. Без неё — обычное тофу."
    - use_in: "Глазирование выпечки"
      replace: "Растительное молоко + кленовый сироп (1:1)"
      note: "Даёт похожий блеск, без блеска не критично."
    - use_in: "Майонез домашний"
      replace: "Аквафаба (жидкость от консервированного нута) 60 мл"
      note: "Взбивается в пену как белок."
  faq:
    - q: "Сколько яиц можно заменить одновременно в одном рецепте?"
      a: "В выпечке без потери структуры — до 2 штук. Больше — сделай пробу на половине порции, не на всём рецепте."
    - q: "Влияет ли замена на калорийность?"
      a: "Яблочное пюре снижает КБЖУ (90 ккал вместо 150 на 3 яйца). Банан добавит ~90 ккал. Тофу — нейтрально по калорийности."
    - q: "Что не работает в качестве замены яиц?"
      a: "Молоко, кефир и йогурт — не дают связки. Меренгу без яиц делать не пробуй — нужна аквафаба или агар."
  linked_recipes: []
  linked_ingredient: "yajco"

- slug: moloko
  name: "Молоко"
  emoji: "🥛"
  updated: "2026-05-16"
  short_answer: "Молоко в напитках и кашах меняется один-к-одному на овсяное, миндальное, кокосовое. Для выпечки лучше всего работает соевое (3,5% белка ближе всего к коровьему). В соусах — кокосовые сливки 17%, не обезжиренные."
  cases:
    - use_in: "Каша, какао, чай"
      replace: "Овсяное / миндальное / кокосовое молоко 1:1"
      note: "Без сахара берёшь сам — большинство магазинных уже подслащены."
    - use_in: "Выпечка (блины, оладьи, кексы)"
      replace: "Соевое молоко 1:1 (по белку ближе всего к коровьему)"
      note: "На рисовом тесто получается жидким."
    - use_in: "Соусы (бешамель, сливочный)"
      replace: "Кокосовые сливки 17–20% жирности"
      note: "Дают плотность. Обезжиренное растительное молоко не загустит соус."
    - use_in: "Йогурт или запеканка"
      replace: "Соевое или кокосовое молоко + 1 ч. л. лимонного сока"
      note: "Кислота сворачивает белок аналогично коровьему молоку."
  faq:
    - q: "Какое растительное молоко самое нейтральное на вкус?"
      a: "Соевое и овсяное. Кокосовое и миндальное — дают свой выраженный привкус, не везде уместный."
    - q: "Можно ли заменить молоко водой?"
      a: "В блинах — да, текстура чуть пострадает. В каше — вкус будет беднее. В соусе и заварном креме — нельзя, нужен жир."
  linked_recipes: []
  linked_ingredient: "moloko"

- slug: smetana
  name: "Сметана"
  emoji: "🥣"
  updated: "2026-05-16"
  short_answer: "Замена сметаны — греческий йогурт без сахара 1:1 (близко по вкусу), в выпечке — кефир + 1 ч. л. крахмала, в соусах — кокосовые сливки 20%. Майонез не используй — другой жир и кислота."
  cases:
    - use_in: "Заправка для салатов, борща, окрошки"
      replace: "Греческий йогурт без сахара 1:1"
      note: "Кислее, добавь щепотку сахара если нужна сладкая нота."
    - use_in: "Выпечка (пирог, чизкейк)"
      replace: "100 мл кефира + 1 ч. л. крахмала на каждые 100 г сметаны"
      note: "Дает похожую плотность."
    - use_in: "Сливочный соус"
      replace: "Кокосовые сливки 20% или сливки 10–20% животные"
      note: "Сливки нагревать на медленном огне, не кипятить."
    - use_in: "К блинам или вареникам"
      replace: "Йогурт + мёд (на сладкое) или йогурт + соль (на солёное)"
      note: "Контраст вкуса работает аналогично."
  faq:
    - q: "Можно ли заменить сметану майонезом?"
      a: "Не стоит. Майонез на яйцах и масле, сметана — на сливках. Получишь другой вкус и текстуру, особенно в горячих блюдах."
    - q: "Что лучше — обезжиренная сметана или йогурт?"
      a: "По вкусу и текстуре йогурт ближе к нормальной сметане, чем обезжиренная сметана. Бери 5% жирности йогурт."
  linked_recipes: []
  linked_ingredient: "smetana"

- slug: slivochnoe-maslo
  name: "Сливочное масло"
  emoji: "🧈"
  updated: "2026-05-16"
  short_answer: "Для жарки — кокосовое масло или топлёное гхи 1:1. В выпечке — растительное масло 0,75 от веса сливочного (например, 75 г вместо 100 г). В тесто на слоёное — маргарин 82% или твёрдое кокосовое масло."
  cases:
    - use_in: "Жарка яиц, мяса, овощей"
      replace: "Кокосовое масло, гхи или растительное (подсолнечное / оливковое)"
      note: "Гхи нагревается до 250 градусов — лучший выбор для высоких температур."
    - use_in: "Выпечка (печенье, кексы)"
      replace: "Растительное масло 0,75 от веса сливочного"
      note: "На рассыпчатое песочное — лучше брать твёрдое кокосовое, иначе тесто плывёт."
    - use_in: "Слоёное тесто"
      replace: "Маргарин 82% или твёрдое кокосовое масло (комнатная температура)"
      note: "Жидкое растительное масло не подойдёт — слои не получатся."
    - use_in: "К каше или гарниру"
      replace: "Оливковое масло extra virgin + щепотка соли"
      note: "Уместно для пасты, гречки, риса. Для манной каши вкус будет непривычным."
  faq:
    - q: "Маргарин — это та же замена?"
      a: "Только в слоёном тесте. В обычной выпечке маргарин даёт неприятный привкус и менее полезен по составу жиров."
    - q: "Можно ли вообще не класть сливочное масло?"
      a: "В каше — можно, вкус будет беднее. В тесте — нельзя, оно даёт структуру и рассыпчатость."
  linked_recipes: []
  linked_ingredient: "slivochnoe-maslo"

- slug: muka-psh
  name: "Мука пшеничная"
  emoji: "🌾"
  updated: "2026-05-16"
  short_answer: "Безглютеновая замена пшеничной муки — смесь рисовой 50% + кукурузной 30% + крахмала 20%. Для безбелковой — миндальная или кокосовая (объём сокращаем на 25%, добавляем больше яиц)."
  cases:
    - use_in: "Безглютеновая выпечка"
      replace: "Рисовая 50% + кукурузная 30% + крахмал 20%"
      note: "Без крахмала тесто крошится. Можно купить готовую смесь."
    - use_in: "Низкоуглеводная выпечка"
      replace: "Миндальная мука 75% от веса пшеничной + 1 яйцо на каждые 100 г"
      note: "Без дополнительных яиц структура не держится."
    - use_in: "Загущение соуса"
      replace: "Кукурузный крахмал 0,5 от веса муки"
      note: "Растворить в холодной воде перед добавлением, иначе будут комки."
    - use_in: "Панировка"
      replace: "Рисовая мука или кукурузная — даёт более хрустящую корочку"
      note: "Перед обжаркой можно дважды панировать в яйце + муке."
  faq:
    - q: "Можно ли заменить муку овсяными хлопьями?"
      a: "В оладьи и кексы — да, измельчи в блендере. В тонкое тесто (блины, песочное) — нет, не даст структуры."
    - q: "Цельнозерновая мука — это замена обычной?"
      a: "Один к одному не работает, потому что цельнозерновая впитывает больше жидкости. Бери 80% от обычной муки и добавь 10–20% жидкости в рецепте."
