  linked_ingredient: "muka"

- slug: sahar
  name: "Сахар"
  emoji: "🍯"
  updated: "2026-05-16"
  short_answer: "На 100 г сахара — 75 г мёда или 80 мл кленового сиропа (плюс уменьшаем жидкость в рецепте на 30 мл). Эритрит и стевия — 1:1, но в выпечке стевия может горчить."
  cases:
    - use_in: "Чай, кофе, напитки"
      replace: "Мёд, эритрит, стевия — по вкусу"
      note: "Стевия слаще сахара в 200–300 раз, начинай с малых доз."
    - use_in: "Выпечка"
      replace: "Мёд 0,75 от веса сахара, минус 30 мл жидкости в рецепте"
      note: "Мёд даёт золотистый цвет и мягкую текстуру."
    - use_in: "Безуглеводная выпечка"
      replace: "Эритрит 1:1 или ксилит 1:1"
      note: "Не вызывают подъёма уровня сахара. На вкус нейтральны."
    - use_in: "Карамелизация"
      replace: "Сахарозаменители не карамелизуются — только настоящий сахар (тростниковый, белый)"
      note: "Альтернатива — кленовый сироп нагретый до 110 градусов."
  faq:
    - q: "Можно ли совсем убрать сахар из рецепта?"
      a: "Из выпечки — нет, он нужен для структуры дрожжевого теста и для меренги. Из соусов и маринадов — можно, баланс вкуса меняется."
    - q: "Коричневый сахар — это замена?"
      a: "Это сахар с патокой, не диетическая альтернатива. По калориям то же самое. Даёт более глубокий вкус, цвет."
  linked_recipes: []
  linked_ingredient: "sahar"

- slug: limon
  name: "Лимон"
  emoji: "🍋"
  updated: "2026-05-16"
  short_answer: "Сок лимона меняется один-к-одному на лайм. На 1 ст. л. сока подойдёт 1 ч. л. яблочного или винного уксуса (только если рецепт допускает острую кислоту). Цедра — на цедру апельсина."
  cases:
    - use_in: "Заправка для салата, маринад"
      replace: "Сок лайма 1:1 или яблочный уксус 1/3 объёма"
      note: "Уксус значительно острее — уменьши количество и добавь щепотку сахара."
    - use_in: "Выпечка или крем"
      replace: "Лимонная кислота на кончике ножа + сок апельсина 1:1"
      note: "Цедру лучше заменить апельсиновой — будет мягче."
    - use_in: "Рыба (полить перед подачей)"
      replace: "Сок лайма или лимонная кислота, разведённая в воде"
      note: "На белой рыбе подойдёт даже белый винный уксус."
    - use_in: "Чай или напитки"
      replace: "Сок апельсина или лайма"
      note: "Лимонный сок концентрированный не используй — много консервантов."
  faq:
    - q: "Лимонная кислота заменяет лимон в выпечке?"
      a: "Да, но дозировка — на кончике ножа на 100 г муки. Передозировка даёт химический привкус."
    - q: "Можно ли заменить цедру эссенцией?"
      a: "Можно, но 1 капля эссенции равна цедре половины лимона. Очень концентрировано."
  linked_recipes: []
  linked_ingredient: "limon"

- slug: drozhzhi-suhie
  name: "Дрожжи сухие"
  emoji: "🥖"
  updated: "2026-05-16"
  short_answer: "1 пакетик сухих дрожжей (7 г) равен 25 г свежих прессованных или 100 мл закваски. В содовом тесте — 1 ч. л. соды + 1 ст. л. уксуса (или 1,5 ч. л. разрыхлителя) на 250 г муки. Но в дрожжевое тесто это не работает."
  cases:
    - use_in: "Дрожжевое тесто (хлеб, булочки)"
      replace: "Свежие прессованные дрожжи (25 г вместо 7 г сухих) или закваска (100 мл)"
      note: "Закваска требует подъёма 8–12 часов, не 1–2 как дрожжи."
    - use_in: "Быстрая выпечка (кексы, оладьи)"
      replace: "1,5 ч. л. разрыхлителя или 1 ч. л. соды + 1 ст. л. уксуса"
      note: "Не подходит для дрожжевого хлеба — поднимет, но текстура другая."
    - use_in: "Пицца"
      replace: "Содовое тесто без дрожжей — кефир + сода + мука"
      note: "Тесто более пресное, ближе к лепёшке, но готовится за 20 минут."
  faq:
    - q: "Можно ли использовать просроченные дрожжи?"
      a: "Если хранились в холоде, дрожжи живые ещё 1–2 месяца после даты. Проверь — положи в тёплую воду с сахаром на 10 минут, должна быть пенка."
    - q: "Сухие быстродействующие дрожжи и обычные сухие — одно и то же?"
      a: "Нет. Быстродействующие добавляются в муку сразу, обычные нужно «активировать» в тёплой воде 10 минут."
  linked_recipes: []
  linked_ingredient: "drozhzhi"

- slug: kefir
  name: "Кефир"
  emoji: "🥛"
  updated: "2026-05-16"
  short_answer: "Кефир в выпечке заменяется на йогурт 1:1, на молоко + 1 ст. л. лимонного сока (на 200 мл), на ряженку или простоквашу 1:1. В окрошку — на сыворотку или айран."
  cases:
    - use_in: "Оладьи, блины"
      replace: "Йогурт без сахара 1:1 или молоко + 1 ст. л. лимонного сока"
      note: "Кислота нужна для реакции с содой, иначе тесто не поднимется."
    - use_in: "Окрошка"
      replace: "Сыворотка от творога, айран, простокваша"
      note: "Минералка не даст той же кислоты, нужно добавлять уксус или сок лимона."
    - use_in: "Маринад для мяса"
      replace: "Йогурт, ряженка, кислое молоко"
      note: "Молочная кислота смягчает мясо. Маринуй минимум 2 часа."
    - use_in: "Питьё"
      replace: "Йогурт питьевой, айран, ряженка"
      note: "Самый близкий аналог — питьевой йогурт без сахара."
  faq:
    - q: "Можно ли заменить кефир молоком?"
      a: "Только если рецепт без соды и без подъёма теста. Иначе молоко не даст реакции, тесто не поднимется."
    - q: "В чём разница между кефиром и йогуртом для готовки?"
      a: "В кефире — кефирные грибки, в йогурте — болгарская палочка. По кислотности и текстуре в выпечке взаимозаменяемы."
  linked_recipes: []
  linked_ingredient: "kefir"

- slug: maslo-rastitelnoe
  name: "Растительное масло"
  emoji: "🫒"
  updated: "2026-05-16"
  short_answer: "Подсолнечное масло меняется на оливковое 1:1 (придаст оттенок вкуса), на кокосовое 0,9:1, на топлёное сливочное 1:1. Для фритюра — только рафинированные масла с дымообразованием выше 200 градусов."
  cases:
    - use_in: "Заправка салата"
      replace: "Оливковое, льняное, кунжутное"
      note: "Льняное хранится в холодильнике, нагревать нельзя."
    - use_in: "Жарка"
      replace: "Рафинированное оливковое, кокосовое, топлёное масло (гхи)"
      note: "Extra virgin оливковое горит при высокой температуре — для жарки не подходит."
    - use_in: "Выпечка"
      replace: "Рафинированное оливковое или растопленное сливочное масло"
      note: "Кокосовое даёт характерный привкус, не везде уместно."
    - use_in: "Фритюр"
      replace: "Рафинированное подсолнечное, рисовое, арахисовое"
      note: "Точка дыма выше 200 градусов обязательна, иначе образуются акриламиды."
  faq:
    - q: "Какое масло самое полезное для жарки?"
      a: "Гхи и кокосовое — стабильны при высокой температуре. Extra virgin оливковое — только для салатов и сотирования при низкой температуре."
    - q: "Можно ли смешивать масла?"
      a: "Можно. Оливковое + подсолнечное 50:50 — хороший компромисс цены и вкуса для повседневной жарки."
  linked_recipes: []
  linked_ingredient: "maslo-rastitelnoe"
