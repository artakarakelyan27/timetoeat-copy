# Сроки хранения — данные для /spravochnik/srok-khraneniya/[slug].
#
# Структура:
#   slug, name, emoji          — ключевые поля
#   short_answer               — ответ в 1-2 предложениях (для AI)
#   updated                    — дата последнего пересмотра
#   storage                    — массив условий хранения
#       where                  — место (холодильник/морозилка/комнатная)
#       temperature            — диапазон
#       duration               — время в формате «3-5 дней»
#       notes                  — критичные условия
#   spoilage_signs             — как понять что испортился (важный AI/GEO-узел)
#   how_to_freeze              — пошагово, если применимо (под HowTo schema)
#   faq, linked_recipes, linked_ingredient — как в zameny.yaml

- slug: yajco
  name: Яйца куриные
  emoji: 🥚
  updated: 2026-05-16
  short_answer: >-
    Свежие сырые яйца в холодильнике — 3–4 недели при +2…+5°C. При комнатной
    температуре — не более 7 дней. Варёные в скорлупе — 7 дней в холодильнике,
    очищенные — 2–3 дня.
  storage:
    - where: Холодильник
      temperature: +2…+5°C
      duration: 28–35 дней
      notes: Тупым концом вверх, не на дверце (там температура нестабильна).
    - where: Холодильник, варёные в скорлупе
      temperature: +2…+5°C
      duration: 7 дней
      notes: Скорлупа защищает белок от высыхания.
    - where: Холодильник, очищенные варёные
      temperature: +2…+5°C
      duration: 2–3 дня
      notes: Без скорлупы быстро впитывают запахи.
    - where: Морозилка
      temperature: −18°C
      duration: 10 месяцев
      notes: Замораживать только без скорлупы (взболтать белок с желтком). Целое — лопнет.
    - where: Комнатная температура
      temperature: до +20°C
      duration: 5–7 дней
      notes: Допускается, если яйца домашние и неомытые. Промышленные мыли — хранить только в холоде.
  spoilage_signs:
    - Запах сероводорода (тухлый) при разбивании. Главный признак.
    - Желток растёкся плоско, белок водянистый — яйцо старое, но не обязательно тухлое.
    - В воде целое яйцо встаёт вертикально или всплывает — несвежее, лучше не варить вкрутую.
    - На скорлупе видны зеленовато-серые пятна — заражение бактериями.
  how_to_freeze:
    - Разбить яйца в миску, проколоть желтки вилкой.
    - Слегка взболтать. Не взбивать до пены — нужна однородная масса.
    - Перелить в формочки для льда или в пакет с надписью «N штук, дата».
    - В морозилке до 10 месяцев. Размораживать в холодильнике ночь.
  faq:
    - q: Можно ли есть яйца с истекшим сроком на коробке?
      a: Если запах нормальный и тест на воду пройден (тонет / горизонтально лежит) — да, ещё 1–2 недели после официальной даты. Для сырых блюд (тирамису, гоголь-моголь) не используй.
    - q: Почему домашние яйца не моют?
      a: Скорлупу покрывает естественная плёнка кутикула — она защищает от бактерий. Мытьё её смывает, и яйцо нужно сразу класть в холод.
  linked_recipes: []
  linked_ingredient: yajco

- slug: kuritsa
  name: Курица (сырая)
  emoji: 🍗
  updated: 2026-05-16
  short_answer: >-
    Сырая курица в холодильнике — 1–2 дня при +2…+4°C. Замороженная — до 9
    месяцев при −18°C. Маринованная — увеличивает срок в холодильнике до
    3 дней, не больше.
  storage:
    - where: Холодильник
      temperature: +2…+4°C
      duration: 1–2 дня
      notes: Только в нижнем отсеке, не выше других продуктов. Под филе — салфетка, впитывающая сок.
    - where: Холодильник, маринованная
      temperature: +2…+4°C
      duration: 2–3 дня
      notes: Маринад с кислотой или солью замедляет рост бактерий.
    - where: Морозилка
      temperature: −18°C
      duration: 9 месяцев (грудка), 4–6 месяцев (целая тушка)
      notes: Заморозить в день покупки в плотном пакете без воздуха.
    - where: Холодильник, варёная / запечённая
      temperature: +2…+4°C
      duration: 3–4 дня
      notes: В герметичном контейнере. Разогревать до 75°C внутри.
  spoilage_signs:
    - Сероватый или зеленоватый оттенок мяса вместо розового — выкидывать.
    - Кислый или аммиачный запах — главный признак, проверять сразу при разморозке.
    - Слизистая, липкая поверхность.
    - На упаковке вздувшаяся плёнка — газ от размножившихся бактерий.
  how_to_freeze:
    - Разделить тушку на порционные куски (по 1 приёму пищи).
    - Каждый кусок — в отдельный пакет с надписью «вес, дата».
    - Выдавить воздух, заклеить.
    - Уложить плоско в морозилку — быстрее замерзает, легче размораживается.
  faq:
    - q: Можно ли замораживать курицу повторно после разморозки?
      a: Нет, если она была сырой при разморозке. Можно — если приготовили блюдо после первой разморозки (тогда заморозить готовое).
    - q: Сколько хранятся куриные субпродукты (печень, сердечки)?
      a: В холодильнике 24 часа, не больше. Это самые скоропортящиеся части. В морозилке — 3–4 месяца.
  linked_recipes: []
  linked_ingredient: kuritsa

- slug: moloko
  name: Молоко
  emoji: 🥛
  updated: 2026-05-16
  short_answer: >-
    Свежее пастеризованное молоко — 5–7 дней в холодильнике при +2…+6°C
    после открытия. Закрытое UHT (ультрапастеризованное) — до даты на упаковке.
    Замораживание возможно, но текстура после оттаивания изменится.
  storage:
    - where: Холодильник, открытое
      temperature: +2…+6°C
      duration: 3–5 дней (пастеризованное), 5–7 дней (UHT)
      notes: Дверца — нестабильная температура. Лучше ставить вглубь полки.
    - where: Холодильник, закрытое
      temperature: +2…+6°C
      duration: До даты на упаковке
      notes: Для пастеризованного обычно 7 дней с даты разлива.
    - where: Морозилка
      temperature: −18°C
      duration: 1 месяц
      notes: Перелить из бумажной упаковки в пластиковую — стекло лопнет. Текстура после оттаивания зернистая, для каши/выпечки годится, для напитка хуже.
  spoilage_signs:
    - Кислый запах при открытии — критерий №1.
    - Хлопья при нагревании — белок сворачивается, молоко скисло.
    - Густая текстура, тянется ниткой — испорчено.
    - Прогорклый привкус — окислились жиры.
  how_to_freeze:
    - Перелить молоко в пластиковую бутылку или контейнер.
    - Оставить 2 см пустого места — расширяется при замерзании.
    - Подписать дату и жирность.
    - Размораживать в холодильнике (8–12 часов), не на столе.
  faq:
    - q: Что значит UHT и почему такое молоко хранится дольше?
      a: Ультрапастеризация — нагрев до 140°C на 2 секунды. Убивает все бактерии и споры. Поэтому до открытия хранится без холодильника 6 месяцев.
    - q: Можно ли использовать скисшее молоко в выпечке?
      a: Да, если запах кислый, но не гнилостный. Получится аналог кефира — хорошо для оладий, блинов, кексов.
  linked_recipes: []
  linked_ingredient: moloko

- slug: smetana
  name: Сметана
  emoji: 🥣
  updated: 2026-05-16
  short_answer: >-
    Открытая сметана в холодильнике — 3–5 дней при +2…+6°C. Закрытая — до
    даты на упаковке (обычно 14 дней). Замораживать не рекомендуется — после
    оттаивания расслаивается.
  storage:
    - where: Холодильник, открытая
      temperature: +2…+6°C
      duration: 3–5 дней
      notes: Брать чистой ложкой, иначе обсеменяется бактериями с другой еды.
    - where: Холодильник, закрытая
      temperature: +2…+6°C
      duration: До даты на упаковке (10–14 дней с производства)
      notes: Не на дверце.
    - where: Морозилка
      temperature: −18°C
      duration: 3–6 месяцев (только как ингредиент для выпечки/соусов)
      notes: После оттаивания структура зернистая. Для крема и заправки салатов не годится.
  spoilage_signs:
    - Дрожжевой или плесневый запах.
    - Зелёные/чёрные пятна плесени — выкинуть всю упаковку, не срезать.
    - Расслоилась на сыворотку и густое — испортилась.
    - Газы при открытии (вздулся контейнер) — критично, не есть.
  how_to_freeze:
    - Перемешать ложкой до однородности.
    - Разложить порциями по 100–200 г в контейнеры с крышкой.
    - В морозилку до 3 месяцев.
    - Размораживать в холодильнике. Перед использованием — взбить вилкой.
  faq:
    - q: Можно ли убрать плесень с поверхности и есть остальное?
      a: Нет. Плесень даёт нити внутрь продукта, которые не видны. Молочные продукты с плесенью выкидывают целиком.
    - q: Почему сметана быстро скисает после открытия?
      a: Контакт с воздухом + ложка с бактериями = идеальные условия для размножения молочной кислоты. Чтобы продлить — переложи в чистую банку с плотной крышкой.
  linked_recipes: []
  linked_ingredient: smetana

- slug: hleb
  name: Хлеб
  emoji: 🍞
  updated: 2026-05-16
  short_answer: >-
    Белый хлеб при комнатной температуре в бумажном пакете — 2–3 дня, в
    хлебнице — до 5 дней. В холодильнике черствеет быстрее (за 1 день). В
    морозилке — до 3 месяцев в нарезке.
  storage:
    - where: Хлебница (комнатная температура)
      temperature: +18…+22°C
      duration: 3–5 дней
      notes: В деревянной или керамической. Пластик копит влагу — плесень.
    - where: Бумажный пакет на столе
      temperature: +18…+22°C
      duration: 2–3 дня
      notes: Для свежеиспечённого хлеба — лучший способ сохранить корку хрустящей.
    - where: Морозилка
      temperature: −18°C
      duration: 3 месяца
      notes: Заморозить нарезанным — доставать по кускам. Размораживать в тостере, не на воздухе.
    - where: Холодильник
      temperature: +2…+6°C
      duration: 3–5 дней, но черствеет быстро
      notes: Хорошо только для предотвращения плесени летом. Текстура страдает.
  spoilage_signs:
    - Зелёная/чёрная плесень — выкинуть весь батон, не срезать (споры в воздухе).
    - Кислый запах брожения — нежелательные дрожжи.
    - Тянущиеся слизистые нити при разломе — заражение Bacillus subtilis. Опасно, не есть.
  how_to_freeze:
    - Нарезать хлеб удобными кусками (по 1–2 на приём пищи).
    - Каждую партию завернуть в пищевую плёнку или в zip-пакет.
    - В морозилку до 3 месяцев. Подписать дату.
    - Размораживать в тостере (2–3 минуты) или на сковороде без масла.
  faq:
    - q: Что делать с черствым хлебом, если плесени нет?
      a: Сухари в духовку 100°C на 30 минут — для супов или панировки. Тосты на сковороде с маслом. Гренки с яйцом и молоком (френч-тост).
    - q: Можно ли есть хлеб с одной плесневой точкой?
      a: Нет. Нити плесени уходят внутрь хлеба и видны только под микроскопом. Выкинуть полностью.
