# nginx-конфиг для тестового домена timetoeat.tw1.ru
#
# Архитектура после миграции SPA-онбординга на /onboarding (см. SPA-PATCH-ROUTING.md):
#   /                       → Nuxt SEO-лендинг (статика)
#   /menu, /profile, ...    → SPA Vue 3
#   /recepty, /spravochnik  → Nuxt SEO-страницы
#   /api/*                  → FastAPI
#   /og/*, /sitemap.xml     → Nuxt server (динамика)
#
# Установка:
#   sudo cp timetoeat.tw1.ru.nginx.conf /etc/nginx/sites-available/timetoeat.tw1.ru
#   sudo nginx -t && sudo systemctl reload nginx

server {
	listen 80;
	listen [::]:80;
	server_name timetoeat.tw1.ru www.timetoeat.tw1.ru;

	location /.well-known/acme-challenge/ {
		root /var/www/html;
	}

	location / {
		return 301 https://timetoeat.tw1.ru$request_uri;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name www.timetoeat.tw1.ru;

	ssl_certificate /etc/letsencrypt/live/timetoeat.tw1.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/timetoeat.tw1.ru/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	return 301 https://timetoeat.tw1.ru$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name timetoeat.tw1.ru;

	ssl_certificate /etc/letsencrypt/live/timetoeat.tw1.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/timetoeat.tw1.ru/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	# Тестовый домен — никогда не индексируется
	add_header X-Robots-Tag "noindex, nofollow" always;
	add_header Strict-Transport-Security "max-age=31536000" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	access_log /var/log/nginx/timetoeat-access.log;
	error_log  /var/log/nginx/timetoeat-error.log;

	gzip on;
	gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript application/xml;
	gzip_min_length 1024;

	# ─── 1. /api/* → FastAPI ────────────────────────────────
	location /api/ {
		proxy_pass http://127.0.0.1:8000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# ─── 2. /api/_content/* → Nuxt server (контент-yaml роуты) ───
	location ^~ /api/_content/ {
		proxy_pass http://127.0.0.1:3001;
		proxy_set_header Host $host;
	}

	# ─── 3. /og/* → Nuxt server (динамические OG-картинки) ───
	location ^~ /og/ {
		proxy_pass http://127.0.0.1:3001;
		proxy_set_header Host $host;
		proxy_cache_valid 200 24h;
	}

	# ─── 4. /sitemap.xml → Nuxt server (динамический сбор) ───
	location = /sitemap.xml {
		proxy_pass http://127.0.0.1:3001;
		proxy_set_header Host $host;
	}

	# ─── 5. Главная / → Nuxt SEO-лендинг ────────────────────
	location = / {
		root /var/www/time-to-eat-copy/Front/seo/.output/public;
		try_files /index.html =404;
	}

	# ─── 6. SEO Nuxt-страницы ───────────────────────────────
	location ^~ /recepty            { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /iz/                { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /iz-ostatkov        { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /chto-prigotovit    { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /menyu-na-nedelyu   { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /spravochnik        { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /kak-gotovit        { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /sezon              { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /gotovim-vprok      { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /blog               { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }
	location ^~ /o-proekte          { try_files $uri $uri.html $uri/index.html =404; root /var/www/time-to-eat-copy/Front/seo/.output/public; }

	# Nuxt-ассеты (CSS/JS, шрифты) — Nuxt их складывает в /_nuxt/
	location ^~ /_nuxt/ {
		root /var/www/time-to-eat-copy/Front/seo/.output/public;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# ─── 7. SPA-страницы ───────────────────────────────────
	# Каждый SPA-роут указывает явно — это надёжнее чем generic fallback.
	# Если добавишь новый SPA-роут в src/router/index.js — допиши сюда.
	location ^~ /menu       { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /auth       { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /profile    { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /saved      { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /prices     { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /recipes    { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /onboarding { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /lk         { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }
	location ^~ /share-target { try_files $uri /index.html; root /var/www/time-to-eat-copy/Front/dist; }

	# Vite-ассеты (/assets/* в SPA) — кэшим долго
	location ^~ /assets/ {
		root /var/www/time-to-eat-copy/Front/dist;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# PWA-файлы — манифест и SW
	location = /manifest.webmanifest {
		root /var/www/time-to-eat-copy/Front/dist;
		try_files /manifest.webmanifest =404;
	}
	location = /sw.js {
		root /var/www/time-to-eat-copy/Front/dist;
		add_header Cache-Control "no-cache";   # SW обновляется без задержки
		try_files /sw.js =404;
	}

	# ─── 8. Общие иконки и фавикон — из SPA dist (единый источник) ───
	location = /favicon.svg {
		root /var/www/time-to-eat-copy/Front/dist;
		try_files /favicon.svg =404;
	}
	location = /favicon.ico {
		root /var/www/time-to-eat-copy/Front/dist;
		try_files /favicon.ico =404;
	}
	location ^~ /icons/ {
		root /var/www/time-to-eat-copy/Front/dist;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}
	location ^~ /splash/ {
		root /var/www/time-to-eat-copy/Front/dist;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# ─── 9. robots.txt — из Nuxt (если есть) или dist ──────
	location = /robots.txt {
		root /var/www/time-to-eat-copy/Front/seo/.output/public;
		try_files /robots.txt =404;
	}

	# ─── 10. Всё неопознанное → 404 ────────────────────────
	# Никакого silent fallback на SPA: мы хотим явные 404 для битых URL,
	# чтобы Google не индексировал «пустой шелл» под случайные пути.
	location / {
		return 404;
	}
}
