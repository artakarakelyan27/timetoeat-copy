# Нормализация единиц измерения → canonical unit
# Формат: "как пишут в рецептах" -> стандартное обозначение

aliases:
  # Граммы
  "г": "g"
  "гр": "g"
  "грамм": "g"
  "граммов": "g"
  "грамма": "g"
  "граммы": "g"

  # Килограммы
  "кг": "kg"
  "килограмм": "kg"
  "килограмма": "kg"

  # Миллилитры
  "мл": "ml"
  "миллилитр": "ml"
  "миллилитров": "ml"

  # Литры
  "л": "l"
  "литр": "l"
  "литра": "l"

  # Штуки
  "шт": "piece"
  "шт.": "piece"
  "штук": "piece"
  "штуки": "piece"
  "штука": "piece"

  # Объёмные меры
  "стакан": "cup"
  "стакана": "cup"
  "стаканов": "cup"
  "чашка": "cup"
  "чашки": "cup"

  "ст. л.": "tbsp"
  "ст.л.": "tbsp"
  "столовая ложка": "tbsp"
  "столовые ложки": "tbsp"
  "столовых ложки": "tbsp"
  "столовых ложек": "tbsp"

  "ч. л.": "tsp"
  "ч.л.": "tsp"
  "чайная ложка": "tsp"
  "чайные ложки": "tsp"
  "чайных ложки": "tsp"
  "чайных ложек": "tsp"

  "щепотка": "pinch"
  "щепоть": "pinch"

# Коэффициенты перевода в base_unit
# Ключ: (from_unit, to_base_unit)
conversions:
  # В граммы
  kg_to_g: 1000
  g_to_g: 1
  # В миллилитры
  l_to_ml: 1000
  ml_to_ml: 1
  # Объёмные → граммы (через density_g_per_ml продукта)
  cup_ml: 250        # 1 стакан = 250 мл
  tbsp_ml: 15        # 1 ст.л. = 15 мл
  tsp_ml: 5          # 1 ч.л. = 5 мл
